name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write


jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version & bump
        id: version
        run: |
          cd desktop
          BASE=$(node -p "require('./package.json').version.match(/^\\d+\\.\\d+/)[0]")
          VERSION="${BASE}.${{ github.run_number }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); pkg.version = process.argv[1]; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 4) + '\n');" "$VERSION"

      - name: Upload bumped package.json
        uses: actions/upload-artifact@v4
        with:
          name: package-json
          path: desktop/package.json
          retention-days: 1

  build-windows:
    needs: bump-version
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download bumped package.json
        uses: actions/download-artifact@v4
        with:
          name: package-json
          path: desktop/

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Download Windows sidecar binaries
        shell: pwsh
        run: |
          $outDir = 'desktop/resources/bin/win32/x64'
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null

          # --- Navidrome ---
          Write-Host 'Fetching latest Navidrome release...'
          $ndRelease = Invoke-RestMethod -Uri 'https://api.github.com/repos/navidrome/navidrome/releases/latest' -Headers @{ Authorization = 'Bearer ${{ secrets.GITHUB_TOKEN }}' }
          $ndAsset = $ndRelease.assets | Where-Object { $_.name -like '*windows_amd64.zip' } | Select-Object -First 1
          if (-not $ndAsset) { throw 'Could not find Navidrome Windows amd64 asset' }
          Invoke-WebRequest -Uri $ndAsset.browser_download_url -OutFile 'navidrome.zip'
          Expand-Archive -Path 'navidrome.zip' -DestinationPath $outDir -Force
          Remove-Item 'navidrome.zip'
          Write-Host "Downloaded Navidrome: $($ndAsset.name)"

          # --- yt-dlp ---
          Write-Host 'Fetching yt-dlp...'
          Invoke-WebRequest -Uri 'https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe' -OutFile "$outDir/yt-dlp.exe"
          Write-Host 'Downloaded yt-dlp.exe'

          # --- ffmpeg (static build from BtbN) ---
          Write-Host 'Fetching ffmpeg...'
          Invoke-WebRequest -Uri 'https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip' -OutFile 'ffmpeg.zip'
          Expand-Archive -Path 'ffmpeg.zip' -DestinationPath 'ffmpeg_temp' -Force
          $ffmpegBin = Get-ChildItem -Path 'ffmpeg_temp' -Recurse -Filter 'ffmpeg.exe' | Select-Object -First 1
          $ffprobeBin = Get-ChildItem -Path 'ffmpeg_temp' -Recurse -Filter 'ffprobe.exe' | Select-Object -First 1
          if ($ffmpegBin) { Move-Item -Path $ffmpegBin.FullName -Destination "$outDir/ffmpeg.exe" -Force }
          if ($ffprobeBin) { Move-Item -Path $ffprobeBin.FullName -Destination "$outDir/ffprobe.exe" -Force }
          Remove-Item 'ffmpeg.zip'
          Remove-Item 'ffmpeg_temp' -Recurse -Force
          Write-Host 'Downloaded ffmpeg.exe and ffprobe.exe'

          # --- Deno ---
          Write-Host 'Fetching latest Deno release...'
          $denoRelease = Invoke-RestMethod -Uri 'https://api.github.com/repos/denoland/deno/releases/latest' -Headers @{ Authorization = 'Bearer ${{ secrets.GITHUB_TOKEN }}' }
          $denoAsset = $denoRelease.assets | Where-Object { $_.name -eq 'deno-x86_64-pc-windows-msvc.zip' } | Select-Object -First 1
          if (-not $denoAsset) { throw 'Could not find Deno Windows x64 asset' }
          Invoke-WebRequest -Uri $denoAsset.browser_download_url -OutFile 'deno.zip'
          Expand-Archive -Path 'deno.zip' -DestinationPath $outDir -Force
          Remove-Item 'deno.zip'
          Write-Host "Downloaded Deno: $($denoAsset.name)"

          # List final binaries
          Write-Host '--- Bundled binaries ---'
          Get-ChildItem -Path $outDir | ForEach-Object { Write-Host $_.Name }

      - name: Install dependencies
        working-directory: desktop
        run: pnpm install

      - name: Build Windows package
        working-directory: desktop
        run: pnpm run build && pnpm exec electron-builder --win --x64 --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: desktop/dist/*
          retention-days: 1

  build-macos:
    needs: bump-version
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download bumped package.json
        uses: actions/download-artifact@v4
        with:
          name: package-json
          path: desktop/

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Download macOS sidecar binaries
        run: |
          set -e
          mkdir -p desktop/resources/bin/darwin/arm64
          mkdir -p desktop/resources/bin/darwin/x64

          # --- Navidrome ---
          echo 'Fetching latest Navidrome release...'
          ND_RELEASE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/navidrome/navidrome/releases/latest)

          # Defensive: print raw response if assets are missing (helps debug rate limits / API errors)
          HAS_ASSETS=$(printf '%s' "$ND_RELEASE" | node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync(0, 'utf8')); console.log(Array.isArray(data.assets) ? 'yes' : 'no');")
          if [ "$HAS_ASSETS" != "yes" ]; then
            echo 'ERROR: Navidrome release API did not return assets. Raw response:'
            printf '%s' "$ND_RELEASE" | head -c 2000
            echo ''
            exit 1
          fi

          ND_ARM64=$(printf '%s' "$ND_RELEASE" | node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync(0, 'utf8')); const asset = data.assets.find((item) => /darwin_arm64/.test(item.name)); if (asset) console.log(asset.browser_download_url);")
          ND_AMD64=$(printf '%s' "$ND_RELEASE" | node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync(0, 'utf8')); const asset = data.assets.find((item) => /darwin_amd64/.test(item.name)); if (asset) console.log(asset.browser_download_url);")
          if [ -z "$ND_ARM64" ]; then echo 'Could not find Navidrome darwin_arm64 asset'; exit 1; fi
          if [ -z "$ND_AMD64" ]; then echo 'Could not find Navidrome darwin_amd64 asset'; exit 1; fi

          curl -L -o navidrome_arm64.tar.gz "$ND_ARM64"
          tar -xzf navidrome_arm64.tar.gz -C desktop/resources/bin/darwin/arm64 navidrome
          rm navidrome_arm64.tar.gz

          curl -L -o navidrome_amd64.tar.gz "$ND_AMD64"
          tar -xzf navidrome_amd64.tar.gz -C desktop/resources/bin/darwin/x64 navidrome
          rm navidrome_amd64.tar.gz

          # --- yt-dlp ---
          echo 'Fetching yt-dlp...'
          curl -L -o desktop/resources/bin/darwin/arm64/yt-dlp https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos
          cp desktop/resources/bin/darwin/arm64/yt-dlp desktop/resources/bin/darwin/x64/yt-dlp

          # --- ffmpeg ---
          echo 'Fetching ffmpeg...'
          curl -L -o ffmpeg.zip https://evermeet.cx/ffmpeg/getrelease/zip
          unzip -j ffmpeg.zip ffmpeg -d desktop/resources/bin/darwin/arm64/
          unzip -j ffmpeg.zip ffmpeg -d desktop/resources/bin/darwin/x64/
          rm ffmpeg.zip

          # --- Deno ---
          echo 'Fetching latest Deno release...'
          curl -L -o deno_arm64.zip https://github.com/denoland/deno/releases/latest/download/deno-aarch64-apple-darwin.zip
          unzip -j deno_arm64.zip -d desktop/resources/bin/darwin/arm64/
          rm deno_arm64.zip

          curl -L -o deno_x64.zip https://github.com/denoland/deno/releases/latest/download/deno-x86_64-apple-darwin.zip
          unzip -j deno_x64.zip -d desktop/resources/bin/darwin/x64/
          rm deno_x64.zip

          # Make executables
          chmod +x desktop/resources/bin/darwin/arm64/*
          chmod +x desktop/resources/bin/darwin/x64/*

          echo '--- Bundled binaries ---'
          find desktop/resources/bin/darwin -type f

      - name: Install dependencies
        working-directory: desktop
        run: pnpm install

      - name: Build macOS package
        working-directory: desktop
        run: pnpm run build && pnpm exec electron-builder --mac --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: desktop/dist/*
          retention-days: 1

  create-release:
    needs: [bump-version, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: dist/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version.outputs.tag }}
          name: Roofy Music ${{ needs.bump-version.outputs.tag }}
          body: |
            ## Downloads

            Choose the file for your operating system and architecture.

            ### Windows (x64)
            | File | Description |
            | -------------------------------------------------------------------------------------------------------------- |
            | `Roofy Music-*-win-x64.exe` | **Installer** -- recommended for most users |
            | `Roofy Music-*-win-x64.zip` | **Portable** -- run without installing |

            ### macOS
            | File | Description |
            | -------------------------------------------------------------------------------------------------------------- |
            | `Roofy Music-*-mac-arm64.dmg` | **Apple Silicon** (M1/M2/M3) -- drag-to-install |
            | `Roofy Music-*-mac-arm64.zip` | **Apple Silicon** (M1/M2/M3) -- portable |
            | `Roofy Music-*-mac-x64.dmg` | **Intel Mac** -- drag-to-install |
            | `Roofy Music-*-mac-x64.zip` | **Intel Mac** -- portable |
          draft: false
          prerelease: false
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
