name: Test

on: [push, pull_request]

jobs:
    lint:
        runs-on: ubuntu-latest

        steps:
            - name: Check out Git repository
              uses: actions/checkout@v6

            - name: Install Node.js and PNPM
              uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Install dependencies
              run: pnpm install

            - name: Lint Files
              run: pnpm run lint
